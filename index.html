<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KFL Auction</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-bar">
      <h1>KFL Auction Arena</h1>
      <p>Dark premium IPL-style live bidding</p>
    </header>

    <main class="container">
      <nav class="tabs">
        <button class="tab-btn active" data-tab="auth">Login / Register</button>
        <button class="tab-btn" data-tab="admin">Admin Panel</button>
        <button class="tab-btn" data-tab="auction">Live Auction</button>
        <button class="tab-btn" data-tab="history">History</button>
      </nav>

      <section class="tab active" id="tab-auth">
        <div class="card">
          <h2>Registration</h2>
          <form id="register-form" class="form-grid">
            <input name="teamName" type="text" placeholder="Team Name" required />
            <input name="username" type="text" placeholder="Username" required />
            <input name="password" type="password" placeholder="Password" required />
            <input name="confirmPassword" type="password" placeholder="Confirm Password" required />
            <button type="submit" class="btn primary">Register</button>
          </form>
        </div>

        <div class="card">
          <h2>Login</h2>
          <form id="login-form" class="form-grid">
            <input name="username" type="text" placeholder="Username" required />
            <input name="password" type="password" placeholder="Password" required />
            <button type="submit" class="btn accent">Login</button>
          </form>
          <p id="login-status" class="status"></p>
        </div>
      </section>

      <section class="tab" id="tab-admin">
        <div class="card admin-grid">
          <button id="start-btn" class="btn primary">Start Auction</button>
          <button id="pause-btn" class="btn">Pause Auction</button>
          <button id="next-btn" class="btn">Next Player</button>
          <button id="end-btn" class="btn danger">End Bidding</button>
        </div>
      </section>

      <section class="tab" id="tab-auction">
        <div class="card auction-card">
          <h2 id="player-name">Player: -</h2>
          <div class="stats">
            <div><span>Base Price</span><strong>1 CR</strong></div>
            <div><span>Current Bid</span><strong id="current-bid">1 CR</strong></div>
            <div><span>Current Team</span><strong id="current-team">-</strong></div>
            <div><span>Timer</span><strong id="countdown">5s</strong></div>
          </div>
          <div class="bid-zone">
            <select id="team-select"></select>
            <button id="bid-btn" class="btn giant primary">BID</button>
            <button id="out-btn" class="btn danger">OUT</button>
          </div>
        </div>

        <div class="card">
          <h3>Active Bidders (Only 2 Teams)</h3>
          <ul id="active-bidders" class="list"></ul>
        </div>

        <div class="card">
          <h3>Team Purse Table</h3>
          <table>
            <thead>
              <tr><th>Team Name</th><th>Remaining Purse (CR)</th></tr>
            </thead>
            <tbody id="team-table"></tbody>
          </table>
        </div>
      </section>

      <section class="tab" id="tab-history">
        <div class="card">
          <h2>Sold Players</h2>
          <table>
            <thead>
              <tr><th>Player</th><th>Sold Team</th><th>Price (CR)</th></tr>
            </thead>
            <tbody id="history-table"></tbody>
          </table>
        </div>
      </section>
    </main>

    <section class="chatbox">
      <div id="chat-messages" class="chat-messages"></div>
      <form id="chat-form" class="chat-form">
        <input id="chat-input" type="text" placeholder="Type message..." required />
        <button type="submit" class="btn accent">Send</button>
      </form>
    </section>

    <script src="app.js"></script>
  </body>
</html>
